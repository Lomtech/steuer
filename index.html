<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8" />
    <title>Stiftungssteuer Tool</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>

    <header>
        <h1>Stiftungssteuer Tool</h1>
    </header>

    <main>

        <!-- ================= Sphären ================= -->
        <section class="card">
            <h2>Sphären (für KSt / GewSt)</h2>

            <div class="grid">
                <div>
                    <label>Ideell Einnahmen</label>
                    <input id="ideal-in" type="number" />
                </div>
                <div>
                    <label>Ideell Ausgaben</label>
                    <input id="ideal-out" type="number" />
                </div>

                <div>
                    <label>Vermögensverwaltung Einnahmen</label>
                    <input id="asset-in" type="number" />
                </div>
                <div>
                    <label>Vermögensverwaltung Ausgaben</label>
                    <input id="asset-out" type="number" />
                </div>

                <div>
                    <label>Zweckbetrieb Einnahmen</label>
                    <input id="purpose-in" type="number" />
                </div>
                <div>
                    <label>Zweckbetrieb Ausgaben</label>
                    <input id="purpose-out" type="number" />
                </div>

                <div>
                    <label>wGB Einnahmen (Brutto!)</label>
                    <input id="biz-in" type="number" />
                </div>
                <div>
                    <label>wGB Ausgaben</label>
                    <input id="biz-out" type="number" />
                </div>
            </div>
        </section>

        <!-- ================= Leistungen ================= -->
        <section class="card">
            <h2>Leistungen (für Umsatzsteuer)</h2>

            <div id="services"></div>

            <button id="add-service">+ Leistung hinzufügen</button>

            <div class="row">
                <label>Vorjahresumsatz (€)</label>
                <input id="prev-year" type="number" />
            </div>

            <label>
                <input type="checkbox" id="klein" />
                Kleinunternehmer anwenden
            </label>
        </section>

        <!-- ================= Steuer ================= -->
        <section class="card">
            <h2>Steuern</h2>

            <div class="row">
                <label>Hebesatz (%)</label>
                <input id="hebesatz" type="number" value="400" />
            </div>

            <button id="calc">Berechnen</button>

            <div class="results">
                <p>KSt + Soli: <strong id="kst"></strong></p>
                <p>GewSt: <strong id="gewst"></strong></p>
                <p>USt: <strong id="ust"></strong></p>
                <p>Gesamt: <strong id="total"></strong></p>
            </div>
        </section>

    </main>

    <script src="app.js"></script>
</body>

</html>
